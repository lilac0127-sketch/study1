<style>
:root {
  --bg: #FCF5EB;
  --card: #FFFFFF;
  --border: #EDD9BF;
  --accent: #E58A55;
  --accent-deep: #B85E2E;
  --text: #2A2419;
  --muted: #8B7B67;
  --serif: 'Nanum Myeongjo', serif;
  --sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  padding: 60px 24px 80px;
  min-height: 100vh;
  font-feature-settings: "palt" 1;
}
.wrap {
  max-width: 720px;
  margin: 0 auto;
}

.masthead {
  margin-bottom: 72px;
}
.logotype {
  font-family: var(--serif);
  font-weight: 800;
  font-size: 52px;
  line-height: 1;
  color: var(--text);
  letter-spacing: -0.03em;
  margin-bottom: 4px;
  display: inline-block;
}
.brush {
  display: block;
  width: 168px;
  height: 12px;
  margin: 2px 0 24px;
}
.tagline {
  font-family: var(--serif);
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 6px;
}
.subtag {
  font-size: 14px;
  color: var(--muted);
  letter-spacing: -0.005em;
}

.section {
  margin-bottom: 56px;
}
.section-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 0.5px solid var(--border);
}
.section-num {
  font-family: var(--serif);
  font-weight: 700;
  color: var(--accent-deep);
  font-size: 13px;
  letter-spacing: 0.12em;
}
.section-title {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.02em;
}

.list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.item {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 18px 20px;
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  text-decoration: none;
  color: inherit;
  transition: all 0.2s ease;
}
.item:hover {
  border-color: var(--accent);
  transform: translateX(4px);
}
.item-tag {
  flex-shrink: 0;
  font-family: var(--serif);
  font-weight: 700;
  font-size: 13px;
  color: var(--accent-deep);
  min-width: 48px;
  letter-spacing: 0;
}
.item-body {
  flex: 1;
  min-width: 0;
}
.item-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.015em;
  margin-bottom: 2px;
}
.item-desc {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: -0.005em;
}
.item-arrow {
  color: var(--muted);
  font-size: 18px;
  transition: all 0.2s ease;
  flex-shrink: 0;
}
.item:hover .item-arrow {
  color: var(--accent);
  transform: translateX(2px);
}

.foot {
  margin-top: 80px;
  padding-top: 32px;
  border-top: 0.5px solid var(--border);
  font-family: var(--serif);
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  letter-spacing: -0.005em;
}

@media (max-width: 640px) {
  body { padding: 40px 20px 60px; }
  .logotype { font-size: 40px; }
  .brush { width: 130px; }
  .tagline { font-size: 17px; }
  .subtag { font-size: 13px; }
  .masthead { margin-bottom: 52px; }
  .section { margin-bottom: 40px; }
  .section-title { font-size: 19px; }
  .item { padding: 16px; gap: 14px; }
  .item-tag { min-width: 44px; font-size: 12px; }
  .item-title { font-size: 15px; }
  .item-desc { font-size: 12px; }
  .item:hover { transform: none; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; }
}
</style>
</head>
