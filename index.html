<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2차시 · 주식시장의 구조</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Georgia&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FEFCF8;
  --bg-soft:#FBF6EE;
  --card:#FFFFFF;
  --gold:#D4A853;
  --gold-deep:#B98A2E;
  --coral:#E87461;
  --sage:#7BA68C;
  --ink:#2E2A24;
  --ink-soft:#6B6258;
  --line:#ECE3D2;
  --shadow: 0 4px 18px rgba(46,42,36,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Noto Sans KR','Noto Serif KR',sans-serif;
  overflow:hidden;
  height:100%;
  width:100%;
}
.serif{font-family:'Noto Serif KR',serif;}
.num{font-family:Georgia,'Noto Serif KR',serif;}

#deck{
  position:relative;
  width:100vw;
  height:100vh;
}
.slide{
  position:absolute;
  inset:0;
  display:none;
  flex-direction:column;
  padding:64px 80px 56px 80px;
  background:var(--bg);
  opacity:0;
  transition:opacity .35s ease;
}
.slide.active{
  display:flex;
  opacity:1;
}

/* ---------- top bar ---------- */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:28px;
  flex-shrink:0;
}
.page-badge{
  width:46px;height:46px;border-radius:50%;
  background:var(--gold);
  color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-weight:700;font-size:20px;
  box-shadow:var(--shadow);
}
.crumb{
  font-size:16px;
  color:var(--ink-soft);
  letter-spacing:0.5px;
}
.crumb b{color:var(--coral);font-weight:700;}

.slide-head{margin-bottom:26px;flex-shrink:0;}
.slide-title{
  font-family:'Noto Serif KR',serif;
  font-weight:700;
  font-size:35px;
  color:var(--ink);
  display:flex;
  align-items:center;
  gap:10px;
}
.slide-title .dot{color:var(--coral);}
.slide-head.center{text-align:center;}
.slide-head.center .slide-title{justify-content:center;font-size:59px;}
.slide-sub{
  font-size:19px;
  color:var(--ink-soft);
  margin-top:6px;
}

.content{
  flex:1;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding-bottom:30px;
}
.content-narrow{
  max-width:760px;
  width:100%;
  margin:0 auto;
}

/* ---------- footer ---------- */
.footer{
  position:absolute;
  bottom:24px;right:80px;
  font-size:13px;color:var(--ink-soft);
  font-family:Georgia,serif;
  letter-spacing:1px;
}

/* ---------- card ---------- */
.card{
  background:var(--card);
  border-left:4px solid var(--gold);
  border-radius:12px;
  box-shadow:var(--shadow);
  padding:22px 24px;
}
.card.coral{border-left-color:var(--coral);}
.card.sage{border-left-color:var(--sage);}
.card-num{
  font-family:Georgia,serif;
  font-weight:700;
  font-size:35px;
  color:var(--gold);
  line-height:1;
  margin-bottom:8px;
}
.card.coral .card-num{color:var(--coral);}
.card.sage .card-num{color:var(--sage);}
.card-title{
  font-size:22px;font-weight:700;color:var(--ink);
  margin-bottom:6px;
}
.card-desc{
  font-size:18px;color:var(--ink-soft);line-height:1.55;
}

/* ---------- grid helpers ---------- */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;}

/* ---------- cover ---------- */
.cover{
  justify-content:center;
  align-items:flex-start;
  position:relative;
}
.cover .chapter-label{
  font-family:Georgia,serif;
  letter-spacing:3px;
  color:var(--gold-deep);
  font-size:20px;
  font-weight:700;
  margin-bottom:18px;
}
.cover .big-num{
  font-family:Georgia,serif;
  font-weight:700;
  font-size:170px;
  color:var(--gold);
  line-height:0.85;
  opacity:0.92;
}
.cover .cover-title{
  font-family:'Noto Serif KR',serif;
  font-weight:700;
  font-size:51px;
  color:var(--ink);
  margin-top:18px;
  line-height:1.35;
}
.cover .cover-sub{
  font-size:21px;
  color:var(--ink-soft);
  margin-top:18px;
  letter-spacing:0.4px;
}
.cover .deco-line{
  position:absolute;
  right:90px;top:64px;bottom:64px;
  width:1px;
  background:linear-gradient(to bottom, transparent, var(--line), transparent);
}
.cover .tag{
  display:inline-block;
  background:var(--bg-soft);
  border:1px solid var(--line);
  color:var(--coral);
  font-size:18px;font-weight:700;
  padding:6px 14px;border-radius:20px;
  margin-top:26px;
}

/* ---------- part divider ---------- */
.part-slide{
  justify-content:center;
  align-items:center;
  text-align:center;
}
.part-slide .part-label{
  font-family:Georgia,serif;
  color:var(--gold-deep);
  letter-spacing:4px;
  font-weight:700;
  font-size:21px;
}
.part-slide .part-num{
  font-family:Georgia,serif;
  font-weight:700;
  font-size:120px;
  color:var(--gold);
  opacity:0.85;
  line-height:1;
  margin:14px 0;
}
.part-slide .part-title{
  font-family:'Noto Serif KR',serif;
  font-weight:700;
  font-size:41px;
  color:var(--ink);
}
.part-slide .part-desc{
  font-size:19px;color:var(--ink-soft);margin-top:14px;
}

/* ---------- table ---------- */
table.titan{
  width:100%;
  border-collapse:collapse;
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
table.titan th{
  background:var(--gold);
  color:#fff;
  font-size:19px;
  font-weight:700;
  padding:14px 16px;
  text-align:left;
}
table.titan td{
  font-size:18.5px;
  padding:13px 16px;
  border-bottom:1px solid var(--line);
  color:var(--ink);
}
table.titan tr:last-child td{border-bottom:none;}
table.titan tr:nth-child(even) td{background:var(--bg-soft);}
table.titan td.hl{color:var(--coral);font-weight:700;}
table.titan td.hl2{color:var(--sage);font-weight:700;}

/* ---------- badge ---------- */
.badge{
  display:inline-block;
  padding:4px 12px;
  border-radius:20px;
  font-size:17px;
  font-weight:700;
}
.badge.gold{background:#FBEFD9;color:var(--gold-deep);}
.badge.coral{background:#FBE3DE;color:var(--coral);}
.badge.sage{background:#E2EEE6;color:var(--sage);}

/* ---------- vs box ---------- */
.vs-wrap{display:flex;align-items:center;gap:18px;}
.vs-box{flex:1;}
.vs-circle{
  width:56px;height:56px;border-radius:50%;
  background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-weight:700;font-size:19px;
  flex-shrink:0;
}

/* ---------- step ---------- */
.step-row{display:flex;align-items:flex-start;gap:18px;margin-bottom:16px;}
.step-circle{
  width:40px;height:40px;border-radius:50%;
  background:var(--gold);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:Georgia,serif;font-weight:700;font-size:21px;
  flex-shrink:0;
}
.step-row.coral .step-circle{background:var(--coral);}
.step-row.sage .step-circle{background:var(--sage);}
.step-body{flex:1;padding-top:4px;}
.step-title{font-size:20px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.step-desc{font-size:18px;color:var(--ink-soft);line-height:1.5;}

/* ---------- warning ---------- */
.warn-strip{
  background:#FBE3DE;
  border-radius:10px;
  padding:14px 20px;
  display:flex;align-items:center;gap:12px;
  margin-bottom:18px;
}
.warn-strip .ic{font-size:20px;}
.warn-strip .tx{font-size:18.5px;color:#9C4A3D;font-weight:600;}

/* ---------- nav ---------- */
.nav-btn{
  position:fixed;
  top:50%;transform:translateY(-50%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.9);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:18px;color:var(--ink-soft);
  z-index:50;
  transition:all .2s;
  user-select:none;
}
.nav-btn:hover{background:var(--gold);color:#fff;}
#prevBtn{left:18px;}
#nextBtn{right:18px;}

.progress-wrap{
  position:fixed;bottom:0;left:0;right:0;
  height:4px;background:var(--line);
  z-index:60;
}
.progress-bar{
  height:100%;background:var(--gold);
  transition:width .3s ease;
}

.dots{
  position:fixed;
  bottom:14px;left:50%;
  transform:translateX(-50%);
  display:flex;gap:6px;
  z-index:60;
}
.dots .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--line);
  cursor:pointer;
}
.dots .dot.active{background:var(--gold);width:18px;border-radius:4px;transition:all .25s;}

/* ---------- ho-ga (order book) ---------- */
.hoga-table{
  width:100%;border-collapse:collapse;
  font-family:Georgia,serif;
}
.hoga-table td{
  text-align:center;
  font-size:19px;font-weight:700;
  padding:9px 6px;
  border-bottom:1px solid var(--line);
}
.hoga-table .sell{background:#FDF2F0;color:var(--coral);}
.hoga-table .buy{background:#EEF5F0;color:var(--sage);}
.hoga-table .price{background:var(--ink);color:#fff;font-size:20px;}
.hoga-table .qty{color:var(--ink-soft);font-weight:400;font-size:18px;}

/* ---------- checklist ---------- */
.check-item{
  display:flex;align-items:center;gap:12px;
  background:var(--card);
  border-radius:10px;
  padding:13px 16px;
  margin-bottom:10px;
  box-shadow:var(--shadow);
}
.check-circle{
  width:26px;height:26px;border-radius:50%;
  background:var(--sage);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;flex-shrink:0;
}
.check-text{font-size:18.5px;color:var(--ink);}

/* ---------- key message ---------- */
.key-card{
  text-align:center;
  background:var(--card);
  border-radius:14px;
  box-shadow:var(--shadow);
  padding:30px 20px;
}
.key-card .emoji{font-size:34px;margin-bottom:10px;}
.key-card .key-num{
  font-family:Georgia,serif;font-weight:700;
  color:var(--gold);font-size:18px;letter-spacing:2px;
  margin-bottom:8px;
}
.key-card .key-text{font-size:20px;font-weight:700;color:var(--ink);line-height:1.5;}

/* ---------- closing ---------- */
.closing{
  justify-content:center;align-items:center;text-align:center;
}
.closing .clap{font-size:48px;margin-bottom:18px;}
.closing .thanks{
  font-family:'Noto Serif KR',serif;font-weight:700;
  font-size:37px;color:var(--ink);margin-bottom:20px;
}
.closing .msg{font-size:20px;color:var(--ink-soft);line-height:1.8;}

</style>
</head>

<div class="dots" id="dots"></div>

<script>
// 슬라이드 네비게이션 로직
let current = 0;
const deck = document.getElementById('deck');
const total = SLIDES.length;

function render(){
  deck.innerHTML = SLIDES.map((html, i) => {
    return html.replace('class="slide', i === current ? 'class="slide active' : 'class="slide');
  }).join('');
}

function buildDots(){
  const dotsWrap = document.getElementById('dots');
  dotsWrap.innerHTML = '';
  for(let i=0;i<total;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i===current ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(d);
  }
}

function updateProgress(){
  const pct = ((current+1)/total)*100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function goTo(i){
  if(i < 0) i = 0;
  if(i > total-1) i = total-1;
  current = i;
  render();
  buildDots();
  updateProgress();
}

function next(){ goTo(current+1); }
function prev(){ goTo(current-1); }

document.getElementById('nextBtn').addEventListener('click', next);
document.getElementById('prevBtn').addEventListener('click', prev);

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown'){ e.preventDefault(); next(); }
  if(e.key === 'ArrowLeft' || e.key === 'PageUp'){ e.preventDefault(); prev(); }
  if(e.key === 'Home'){ goTo(0); }
  if(e.key === 'End'){ goTo(total-1); }
});

// 터치 스와이프
let touchStartX = 0;
document.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
document.addEventListener('touchend', (e) => {
  const touchEndX = e.changedTouches[0].screenX;
  const diff = touchStartX - touchEndX;
  if(Math.abs(diff) > 50){
    if(diff > 0) next(); else prev();
  }
});

render();
buildDots();
updateProgress();

</script>
