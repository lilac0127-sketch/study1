<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4주차 · 미래산업 테크트리 — 섹터별 병목 주도주 지도</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg-primary:#FEFCF8; --bg-warm:#FFF9F0; --bg-card:#FFFFFF; --bg-accent:#FFF5E8;
  --gold:#D4A853; --amber:#E8943A; --coral:#E87461; --sage:#7BA68C; --lavender:#9B8EC4;
  --text-primary:#1A1612; --text-secondary:#6B5E52; --text-muted:#9E8E7E;
  --gradient-gold:linear-gradient(135deg,#D4A853,#E8943A);
  --gradient-hero:linear-gradient(160deg,#FFF5E8,#FFD9C0,#FFF8F0);
  --shadow-card:0 4px 20px rgba(26,22,18,0.07);
  --shadow-hover:0 14px 44px rgba(26,22,18,0.10);
  --radius-sm:12px; --radius-md:16px; --radius-lg:24px; --radius-xl:32px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Plus Jakarta Sans','Pretendard',-apple-system,sans-serif;
  color:var(--text-primary); background:var(--bg-primary);
  line-height:1.6; word-break:keep-all; overflow:hidden;
}
body::before{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(1100px 600px at 80% -8%, rgba(232,148,58,0.10), transparent 60%),
    radial-gradient(900px 500px at -5% 18%, rgba(212,168,83,0.10), transparent 55%),
    radial-gradient(900px 700px at 50% 120%, rgba(123,166,140,0.08), transparent 60%);
}
.serif{font-family:'Playfair Display','Noto Serif KR',Georgia,serif;}

/* ===== DECK SHELL ===== */
.deck{display:flex;flex-direction:column;height:100vh;max-width:1180px;margin:0 auto;padding:0 22px;}
.progress-track{height:4px;background:rgba(212,168,83,0.15);border-radius:4px;margin-top:14px;flex:0 0 auto;}
.progress-fill{height:100%;background:var(--gradient-gold);border-radius:4px;transition:width .35s ease;width:4.5%;}

.deck-header{display:flex;align-items:center;justify-content:space-between;padding:16px 2px 0;flex:0 0 auto;}
.chip{
  font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--amber);background:rgba(232,148,58,0.10);padding:7px 14px;border-radius:30px;
}
.slide-counter{font-family:'JetBrains Mono',monospace;font-size:.78rem;color:var(--text-muted);}

.stage{flex:1 1 auto;position:relative;overflow:hidden;padding:6px 2px 14px;}
.slide{
  position:absolute;inset:6px 2px 14px;overflow-y:auto;
  opacity:0;visibility:hidden;transform:translateY(14px);
  transition:opacity .35s ease,transform .35s ease;padding-right:6px;
}
.slide.active{opacity:1;visibility:visible;transform:translateY(0);}
.slide::-webkit-scrollbar{width:6px;}
.slide::-webkit-scrollbar-thumb{background:rgba(212,168,83,0.35);border-radius:4px;}

.deck-nav{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  gap:14px;padding:14px 2px 22px;
}
.nav-btn{
  font-family:inherit;font-size:.92rem;font-weight:700;color:var(--text-primary);
  background:var(--bg-card);border:1px solid rgba(26,22,18,0.10);border-radius:30px;
  padding:11px 22px;cursor:pointer;transition:all .22s ease;box-shadow:var(--shadow-card);
}
.nav-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:var(--shadow-hover);}
.nav-btn.primary{color:#fff;background:var(--gradient-gold);border-color:transparent;}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;}
.dots{display:flex;gap:6px;flex:1;justify-content:center;flex-wrap:wrap;}
.dot-btn{width:8px;height:8px;border-radius:50%;background:rgba(212,168,83,0.25);border:none;cursor:pointer;padding:0;}
.dot-btn.on{background:var(--gradient-gold);width:20px;border-radius:6px;}

/* ===== GENERIC SLIDE CONTENT ===== */
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:var(--amber);
  background:rgba(232,148,58,0.10);padding:6px 14px;border-radius:30px;margin-bottom:14px;
}
h1.big{font-family:'Playfair Display','Noto Serif KR',serif;font-weight:900;
  font-size:clamp(1.8rem,4.6vw,3rem);line-height:1.18;margin-bottom:10px;
  background:linear-gradient(120deg,#1A1612 0%,#8a6a2c 55%,#D4A853 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;}
h2.slide-title{font-family:'Playfair Display','Noto Serif KR',serif;font-weight:700;
  font-size:clamp(1.4rem,3vw,1.9rem);margin-bottom:6px;}
.slide-sub{color:var(--text-secondary);font-size:.98rem;max-width:760px;margin-bottom:22px;}
.key{color:var(--amber);font-weight:700;}

/* card grid */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;}
@media(max-width:820px){.grid3,.grid2{grid-template-columns:1fr;}}

.card{
  background:var(--bg-card);border:1px solid rgba(26,22,18,0.06);border-radius:var(--radius-lg);
  padding:22px 22px 24px;box-shadow:var(--shadow-card);
}
.card .num{
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.86rem;color:var(--gold);
  background:rgba(212,168,83,0.12);border-radius:9px;padding:5px 10px;display:inline-block;margin-bottom:10px;
}
.card h4{font-family:'Noto Serif KR',serif;font-weight:700;font-size:1.08rem;margin-bottom:8px;}
.card p{color:var(--text-secondary);font-size:.9rem;}

/* legend */
.legend-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;font-size:.92rem;color:var(--text-secondary);}
.dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;margin-top:5px;}
.dot.g{background:var(--sage);} .dot.y{background:var(--amber);} .dot.r{background:var(--coral);}
.legend-row b{color:var(--text-primary);}
.meter-demo{display:inline-flex;gap:3px;align-items:center;vertical-align:middle;}
.meter-demo i{width:8px;height:8px;border-radius:2px;background:var(--gold);display:inline-block;}
.meter-demo i.off{background:rgba(212,168,83,0.22);}

/* cluster intro */
.cluster-head{display:flex;align-items:center;gap:16px;margin-bottom:12px;}
.cluster-ico{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;font-size:1.6rem;
  flex:0 0 auto;box-shadow:var(--shadow-card);background:linear-gradient(135deg,#FFEFD6,#FFD9A8);}
.clabel{font-size:.74rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);}

/* sector slide */
.sector-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;align-items:center;}
.metachip{font-size:.76rem;font-weight:700;padding:6px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;}
.metachip.macro{background:var(--bg-accent);color:var(--amber);}
.metachip.bot{background:rgba(155,142,196,0.12);color:var(--lavender);}
.meter{display:inline-flex;gap:3px;align-items:center;}
.meter i{width:8px;height:8px;border-radius:2px;background:var(--lavender);display:inline-block;}
.meter i.off{background:rgba(155,142,196,0.22);}

.tree{margin-top:8px;}
.node{position:relative;margin-bottom:12px;}
.node:last-child{margin-bottom:0;}
.node-head{
  display:flex;align-items:center;gap:12px;cursor:pointer;flex-wrap:wrap;
  background:var(--bg-warm);border:1px solid rgba(26,22,18,0.06);
  border-radius:14px;padding:13px 16px;transition:all .25s ease;
}
.node-head:hover,.node.open .node-head{
  background:var(--bg-accent);border-color:rgba(212,168,83,0.4);
  box-shadow:0 6px 22px rgba(212,168,83,0.14);
}
.rank{width:26px;height:26px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;
  font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;color:#fff;
  background:var(--gradient-gold);}
.n-name{font-weight:700;font-size:1.02rem;color:var(--text-primary);}
.n-code{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-muted);}
.n-role{font-size:.84rem;color:var(--text-secondary);flex:1;min-width:120px;}
.vis{font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:20px;flex:0 0 auto;}
.vis.g{background:rgba(123,166,140,0.15);color:#5d8a6f;}
.vis.y{background:rgba(232,148,58,0.15);color:#c2761f;}
.vis.r{background:rgba(232,116,97,0.15);color:#cf5340;}
.chev{margin-left:auto;color:var(--text-muted);font-size:.85rem;transition:transform .3s ease;}
.node.open .chev{transform:rotate(180deg);}
.node-body{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease,margin .3s ease;opacity:0;}
.node.open .node-body{max-height:400px;opacity:1;margin-top:9px;}
.nb-inner{background:linear-gradient(160deg,#fff,#fffaf2);border:1px solid rgba(212,168,83,0.18);
  border-left:3px solid var(--gold);border-radius:0 12px 12px 12px;padding:15px 17px;margin-left:6px;}
.nb-row{display:flex;gap:9px;font-size:.88rem;color:var(--text-secondary);margin-bottom:9px;line-height:1.55;}
.nb-row:last-child{margin-bottom:0;}
.nb-row .ic{flex:0 0 auto;}
.nb-row b{color:var(--text-primary);font-weight:700;}
.nb-row.bot b{color:#8a6a2c;}
.nb-row.risk b{color:#cf5340;}

/* summary matrix */
.matrix{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:820px){.matrix{grid-template-columns:1fr;}}
.mtile{background:var(--bg-card);border:1px solid rgba(26,22,18,0.06);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow-card);}
.mtile h5{font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);font-weight:700;margin-bottom:8px;}
.mtile p{font-size:.88rem;color:var(--text-secondary);}
.mtile b{color:var(--text-primary);}

.disc-box{padding:20px 22px;background:var(--bg-card);border:1px dashed rgba(26,22,18,0.16);border-radius:var(--radius-md);margin-top:18px;}
.disc-box h4{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);font-weight:700;margin-bottom:10px;}
.disc-box ul{list-style:none;}
.disc-box li{font-size:.88rem;color:var(--text-secondary);padding-left:18px;position:relative;margin-bottom:8px;}
.disc-box li::before{content:"—";position:absolute;left:0;color:var(--gold);}

.closing-box{text-align:center;padding:60px 20px;}
.closing-box .emoji{font-size:2.6rem;margin-bottom:14px;}
.qa-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px;}
@media(max-width:820px){.qa-grid{grid-template-columns:1fr;}}
.qa-card{background:var(--bg-card);border:1px solid rgba(26,22,18,0.06);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow-card);}
.qa-card h5{font-size:.9rem;color:var(--amber);margin-bottom:8px;font-weight:700;}
.qa-card p{font-size:.86rem;color:var(--text-secondary);}
.hint{font-size:.8rem;color:var(--text-muted);margin-top:16px;}
</style>
</head>
<body>

<div class="deck">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <div class="deck-header">
    <span class="chip">차트초급반 · 4주차</span>
    <span class="slide-counter" id="slideCounter">1 / 1</span>
  </div>

  <main class="stage" id="stage"></main>

  <div class="deck-nav">
    <button class="nav-btn" id="prevBtn">‹ 이전</button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn primary" id="nextBtn">다음 ›</button>
  </div>
</div>

<script>
/* =========================================================
   섹터 데이터 (미래산업 테크트리 원본 자료 기반)
========================================================= */
const clusters = [
  {
    id:'A', icon:'🔷', label:'Branch 01', name:'반도체 코어',

    desc:'전공정(나노 미세화)이 물리적 벽에 부딪히면서, 격전지가 <b>적층·접합·기판·검사</b>의 후공정으로 이동했습니다. AI 가속기·HBM 세대 전환마다 "장비·소재·검사"가 곧 공급 병목이 됩니다.',
    sectors:[

        macro:'AI·HBM4 발주 사이클', meter:3,
        stocks:[
          {name:'한미반도체', code:'042700', role:'HBM TC본더 글로벌 1위', vis:'g', visLabel:'실적 본격화',
            bot:'HBM 적층 TC본더 글로벌 점유율 70%대. 삼성·SK하이닉스·마이크론 양산 수율 데이터·공정 노하우 자체가 진입장벽.',
            mom:'HBM4 발주 사이클(2026 하반기~2028) + 하이브리드 본더 2027~2028 상용화 라인업.',
            risk:'한화세미텍·세메스 멀티벤더화, 차세대 장비 전환기 단기 발주 공백.'},
          {name:'이오테크닉스', code:'039030', role:'정밀 레이저 후공정', vis:'g', visLabel:'실적 본격화',

          {name:'하나마이크론', code:'067310', role:'HBM·시스템 OSAT', vis:'y', visLabel:'실적 회복기',

        ]},
      { num:'S2', title:'유리기판 (Glass Substrate)',
        keyLine:'플라스틱 기판의 발열·미세화 한계를 깨는 게임체인저.', rest:"2026~2028년이 '스토리 → 양산·실적'으로 넘어가는 길목.",
        macro:'AI 가속기 기판 한계 돌파', meter:3,
        stocks:[
          {name:'SKC (앱솔릭스)', code:'011790', role:'세계 최초 양산시설', vis:'r', visLabel:'양산 前',
            bot:'미 조지아에 세계 최초 유리기판 전용 양산시설 선제 완공. 특정 칩사에 종속되지 않는 오픈 생태계 표준 주도(First Mover).',
            mom:'엔비디아·AMD·브로드컴 품질 인증(Qual) 통과 공시가 최대 촉매.',
            risk:'본격 매출 2027년 이후, 적자·증설 자금·양산 수율 안정화 부담.'},
          {name:'필옵틱스', code:'161580', role:'TGV 레이저 장비 (병목 공정)', vis:'y', visLabel:'실적 초기',

        macro:'수율 = 첨단공정 경제성', meter:2,
        stocks:[
          {name:'파크시스템스', code:'140860', role:'AFM 나노 계측 글로벌 1위', vis:'g', visLabel:'실적 성장',
            bot:'원자현미경(AFM) 나노 계측 글로벌 1위. EUV·HBM 미세구조를 원자 단위로 측정하는 독보적 장비.',
            mom:'공정 미세화·신소재 도입으로 AFM 채택 라인 확대.',

          {name:'넥스틴', code:'348210', role:'패턴 결함 검사 국산화', vis:'g', visLabel:'실적 성장',
            bot:'반도체 패턴 결함 검사(다크필드) 국산화 — KLA 과점 시장에 진입한 희소 대체재.',
            mom:'중국·국내 검사 장비 수요, 신모델 라인업.',
            risk:'대중 수출규제·특정 고객 편중.'},
          {name:'고영', code:'098460', role:'3D 검사 글로벌 1위', vis:'g', visLabel:'실적 안정',
            bot:'3D 납도포·외관 검사(SPI/AOI) 글로벌 1위. 반도체·전장 영역으로 검사 확장.',
            mom:'반도체 3D 검사·의료로봇 신사업.',
            risk:'전방 전자·전장 경기 의존.'}
        ]}
    ]
  },
  {

/* =========================================================
   슬라이드 마크업 생성
========================================================= */
function meterHTML(level, total){
  let h = '<span class="meter">';
  for(let i=0;i<total;i++){ h += `<i class="${i<level?'':'off'}"></i>`; }
  h += '</span>';
  return h;
}

function sectorSlideHTML(cl, s){
  const stocksHTML = s.stocks.map((st,i)=>`
    <div class="node">
      <div class="node-head">
        <span class="rank">${i+1}</span>
        <span class="n-name">${st.name}</span>
        <span class="n-code">${st.code}</span>
        <span class="n-role">${st.role}</span>
        <span class="vis ${st.vis}">${st.visLabel}</span>
        <span class="chev">▾</span>
      </div>
      <div class="node-body"><div class="nb-inner">
        <div class="nb-row bot"><span class="ic">🔒</span><span><b>병목</b> · ${st.bot}</span></div>
        <div class="nb-row"><span class="ic">📈</span><span><b>모멘텀</b> · ${st.mom}</span></div>
        <div class="nb-row risk"><span class="ic">⚠️</span><span><b>리스크</b> · ${st.risk}</span></div>
      </div></div>
    </div>`).join('');

  return `
    <span class="eyebrow">${s.num} · ${cl.name}</span>
    <h2 class="slide-title">${s.title}</h2>
    <p class="slide-sub"><span class="key">${s.keyLine}</span> ${s.rest}</p>
    <div class="sector-meta">
      <span class="metachip macro">📡 ${s.macro}</span>
      <span class="metachip bot">병목 강도 ${meterHTML(s.meter,3).replace('meter','meter')}</span>
    </div>
    <div class="tree">${stocksHTML}</div>
    <p class="hint">💡 종목명을 클릭하면 병목·모멘텀·리스크 상세 설명이 펼쳐져요.</p>
  `;
}

function clusterIntroHTML(cl){
  return `
    <div class="cluster-head">
      <div class="cluster-ico">${cl.icon}</div>
      <div>
        <div class="clabel">${cl.label}</div>
        <h2 class="slide-title">${cl.name} — ${cl.subtitle}</h2>
      </div>
    </div>
    <p class="slide-sub" style="max-width:820px;">${cl.desc}</p>
    <div class="grid3" style="margin-top:26px;">
      ${cl.sectors.map(s=>`
        <div class="card">
          <span class="num">${s.num}</span>
          <h4>${s.title}</h4>
          <p>${s.keyLine}</p>
        </div>`).join('')}
    </div>
  `;
}

========================================================= */

slides.push({title:'학습목표', html:staticSlides.objectives});
slides.push({title:'병목 개념', html:staticSlides.lens});

clusters.forEach(cl=>{
  slides.push({title:cl.name+' 소개', html:clusterIntroHTML(cl)});
  cl.sectors.forEach(s=>{
    slides.push({title:s.num+' '+s.title, html:sectorSlideHTML(cl,s)});
  });
});
slides.push({title:'핵심 정리', html:staticSlides.summary});
slides.push({title:'투자 유의사항', html:staticSlides.disclaimer});
slides.push({title:'다음시간 예고', html:staticSlides.nextweek});
slides.push({title:'마무리 Q&A', html:staticSlides.closing});

/* =========================================================
   렌더링 & 네비게이션
========================================================= */
const stage = document.getElementById('stage');
const dotsWrap = document.getElementById('dots');
let current = 0;

slides.forEach((sl,i)=>{
  const div = document.createElement('section');
  div.className = 'slide' + (i===0?' active':'');
  div.dataset.index = i;
  div.innerHTML = sl.html;
  stage.appendChild(div);

  const dot = document.createElement('button');
  dot.className = 'dot-btn' + (i===0?' on':'');
  dot.title = sl.title;
  dot.addEventListener('click', ()=>goTo(i));
  dotsWrap.appendChild(dot);
});

const slideEls = Array.from(stage.querySelectorAll('.slide'));
const dotEls = Array.from(dotsWrap.querySelectorAll('.dot-btn'));
const counterEl = document.getElementById('slideCounter');
const progressFill = document.getElementById('progressFill');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function goTo(i){
  if(i<0||i>=slides.length) return;
  slideEls[current].classList.remove('active');
  dotEls[current].classList.remove('on');
  current = i;
  slideEls[current].classList.add('active');
  dotEls[current].classList.add('on');
  slideEls[current].scrollTop = 0;
  counterEl.textContent = (current+1)+' / '+slides.length;
  progressFill.style.width = (((current+1)/slides.length)*100)+'%';
  prevBtn.disabled = current===0;
  nextBtn.textContent = current===slides.length-1 ? '처음으로 ↺' : '다음 ›';
}

prevBtn.addEventListener('click', ()=>goTo(current-1));
nextBtn.addEventListener('click', ()=>{
  if(current===slides.length-1){ goTo(0); } else { goTo(current+1); }
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='ArrowRight') goTo(Math.min(current+1, slides.length-1));
  if(e.key==='ArrowLeft') goTo(Math.max(current-1, 0));
});

/* 종목 카드 펼치기/접기 */
stage.addEventListener('click', (e)=>{
  const head = e.target.closest('.node-head');
  if(!head) return;
  const node = head.closest('.node');
  const wasOpen = node.classList.contains('open');
  node.closest('.tree').querySelectorAll('.node.open').forEach(n=>{ if(n!==node) n.classList.remove('open'); });
  node.classList.toggle('open', !wasOpen);
});

goTo(0);
</script>
