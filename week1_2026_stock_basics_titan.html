<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>1주차 | 2026년 알아야 할 증시 상식</title>
<style>
  :root{
    --bg:#FEFCF8;
    --ink:#2A2420;
    --ink-soft:#6B6058;
    --ink-mute:#9A8F86;
    --gold:#D4A853;
    --gold-soft:#F4E4BC;
    --coral:#E87461;
    --coral-soft:#F9DDD5;
    --sage:#7BA68C;
    --sage-soft:#D9E7DE;
    --card:#FFFFFF;
    --dark:#221E1B;
    --line:#EFE7DA;
    --line-soft:#F7F1E4;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    background:var(--bg);
    font-family:"Noto Serif KR","나눔명조",Georgia,serif;
    color:var(--ink);
  }
  .serif-en{ font-family:Georgia,"Times New Roman",serif; }

  .deck{
    max-width:1280px;
    margin:0 auto;
    padding:18px 28px 40px;
  }

  /* ===== Top Nav ===== */
  .topnav{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 4px 18px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .toc-btn{
    display:flex;align-items:center;gap:6px;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:8px 14px;
    font-size:14px;font-weight:700;
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
    font-family:"Noto Serif KR",serif;
  }
  .chapter-badge{
    background:var(--coral);
    color:#fff;
    font-family:Georgia,serif;
    font-weight:700;
    font-size:15px;
    border-radius:8px;
    padding:8px 14px;
    letter-spacing:0.5px;
    white-space:nowrap;
  }
  .chapter-title{
    font-size:22px;font-weight:700;color:var(--ink);
    white-space:nowrap;margin-right:6px;
  }

  .tabs-row-wrap{
    display:flex;
    align-items:center;
    gap:16px;
    padding:14px 4px 18px;
    border-bottom:1px solid var(--line);
  }
  .tabs-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    flex:1;
  }
  .tab{
    width:34px;height:34px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;
    background:var(--card);
    border:1px solid var(--line);
    color:var(--ink-soft);
    cursor:pointer;
    font-family:Georgia,serif;
  }
  .tab.active{
    background:var(--coral);
    color:#fff;
    border-color:var(--coral);
  }
  .nav-controls{
    display:flex;gap:6px;
  }
  .nav-controls button{
    width:36px;height:36px;border-radius:8px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink-soft);
    cursor:pointer;font-size:15px;
  }
  .nav-controls button:hover{ background:var(--line-soft); }

  /* ===== Stage & slide ===== */
  .stage{ padding-top:30px; min-height:600px; }
  .slide{ display:none; animation:fade .3s ease; }
  .slide.active{ display:block; }
  @keyframes fade{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

  /* ===== 공통 카드/요소 ===== */
  .chip{
    display:inline-block;
    font-size:12px;font-weight:800;
    letter-spacing:0.5px;
    border-radius:20px;
    padding:5px 14px;
    font-family:"맑은 고딕",sans-serif;
    text-transform:uppercase;
  }
  .chip.gold{ background:var(--gold-soft); color:#8A6B1F; }
  .chip.coral{ background:var(--coral-soft); color:#A73E2B; }
  .chip.sage{ background:var(--sage-soft); color:#3D6A4F; }

  .callout{
    background:var(--dark);
    color:#fff;
    border-radius:14px;
    padding:22px 28px;
    font-size:18px;
    font-weight:500;
    line-height:1.65;
    font-family:"Noto Serif KR",serif;
    text-align:center;
  }
  .callout .accent{ color:var(--gold); font-weight:700; }

  /* ===== Slide 1: Intro ===== */
  .intro{
    text-align:center;
    padding:70px 20px 40px;
  }
  .intro .week{
    font-family:Georgia,serif;
    color:var(--coral);
    font-weight:700;
    font-size:16px;
    letter-spacing:3px;
    margin-bottom:20px;
  }
  .intro h1{
    font-size:52px;
    font-weight:900;
    margin:0 0 18px;
    line-height:1.25;
    letter-spacing:-0.5px;
  }
  .intro .sub{
    font-size:19px;
    color:var(--ink-soft);
    margin-bottom:44px;
    font-family:"Noto Serif KR",serif;
    font-weight:500;
  }
  .intro .callout{
    max-width:760px;
    margin:0 auto;
  }
  .intro .divider{
    width:60px;height:2px;background:var(--gold);
    margin:0 auto 30px;
  }

  /* ===== Slide 2: Agenda 2단 ===== */
  .agenda{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:28px;
    padding:20px 0;
  }
  .agenda-card{
    background:var(--card);
    border-left:4px solid var(--coral);
    border-radius:16px;
    padding:38px 36px;
    box-shadow:0 8px 22px rgba(180,110,60,.08);
    position:relative;
  }
  .agenda-card.sage{ border-left-color:var(--sage); }
  .agenda-card .part-num{
    font-family:Georgia,serif;
    font-style:italic;
    font-size:72px;
    font-weight:400;
    color:var(--coral);
    line-height:0.9;
    margin-bottom:10px;
    opacity:0.85;
  }
  .agenda-card.sage .part-num{ color:var(--sage); }
  .agenda-card h3{
    font-size:26px;font-weight:800;margin:0 0 22px;color:var(--ink);
  }
  .agenda-list{ list-style:none;margin:0;padding:0; }
  .agenda-list li{
    font-size:17px;
    padding:12px 0;
    border-bottom:1px dashed var(--line);
    color:var(--ink);
    font-family:"Noto Serif KR",serif;
  }
  .agenda-list li:last-child{ border-bottom:none; }

  /* ===== Slide 3: 워드카드 + 3포인트 ===== */
  .split-word{
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:30px;
    align-items:stretch;
  }
  .word-card{
    background:var(--card);
    border-radius:16px;
    padding:36px 30px;
    box-shadow:0 8px 22px rgba(180,110,60,.08);
    display:flex;
    flex-direction:column;
    justify-content:center;
    border-top:4px solid var(--gold);
  }
  .word-card .word-label{
    font-family:Georgia,serif;
    font-size:13px;
    color:var(--ink-mute);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .word-card .word-big{
    font-size:38px;
    font-weight:800;
    line-height:1.3;
    color:var(--ink);
    margin-bottom:16px;
  }
  .word-card .word-sub{
    font-size:16px;
    color:var(--ink-soft);
    line-height:1.7;
    font-family:"Noto Serif KR",serif;
  }
  .points{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .point{
    background:var(--card);
    border-left:4px solid var(--gold);
    border-radius:12px;
    padding:20px 24px;
    box-shadow:0 4px 14px rgba(180,110,60,.06);
    display:flex;
    gap:18px;
    align-items:flex-start;
  }
  .point .num{
    font-family:Georgia,serif;
    font-size:26px;
    color:var(--gold);
    font-style:italic;
    line-height:1;
    padding-top:2px;
  }
  .point .txt{
    font-size:17px;
    line-height:1.6;
    color:var(--ink);
    font-family:"Noto Serif KR",serif;
  }

  /* ===== Slide 4/5/8: 큰 숫자 + 3열/N열 카드 ===== */
  .section-head{
    display:flex;
    align-items:flex-end;
    gap:26px;
    margin-bottom:32px;
    padding-bottom:20px;
    border-bottom:1px solid var(--line);
  }
  .section-head .num-big{
    font-family:Georgia,serif;
    font-style:italic;
    font-size:96px;
    font-weight:400;
    line-height:0.85;
    color:var(--coral);
  }
  .section-head .num-big.gold{ color:var(--gold); }
  .section-head .num-big.sage{ color:var(--sage); }
  .section-head .head-text .h-title{
    font-size:32px;font-weight:800;color:var(--ink);
    margin:0 0 8px;line-height:1.3;
  }
  .section-head .head-text .h-sub{
    font-size:15px;color:var(--ink-soft);
    font-family:"Noto Serif KR",serif;
  }
  .col-cards{
    display:grid;
    gap:20px;
  }
  .col-cards.c3{ grid-template-columns:repeat(3,1fr); }
  .col-cards.c2{ grid-template-columns:repeat(2,1fr); }
  .col-card{
    background:var(--card);
    border-radius:14px;
    padding:26px 24px;
    box-shadow:0 6px 18px rgba(180,110,60,.07);
    border-top:3px solid var(--coral);
  }
  .col-card.gold{ border-top-color:var(--gold); }
  .col-card.sage{ border-top-color:var(--sage); }
  .col-card .cc-label{
    font-family:Georgia,serif;
    font-size:12px;
    letter-spacing:1.5px;
    color:var(--ink-mute);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .col-card h4{
    font-size:20px;font-weight:800;margin:0 0 14px;color:var(--ink);
    line-height:1.35;
  }
  .col-card p{
    font-size:16px;line-height:1.65;margin:0;
    color:var(--ink-soft);
    font-family:"Noto Serif KR",serif;
  }

  .slide-tail{ margin-top:28px; }

  /* ===== Slide 6: 세 주체 place 카드 (다크 히어로) ===== */
  .hero-dark{
    background:var(--dark);
    color:#fff;
    border-radius:16px;
    padding:34px 36px;
    margin-bottom:24px;
  }
  .hero-dark .h-eyebrow{
    font-family:Georgia,serif;
    font-size:13px;
    letter-spacing:2px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:12px;
  }
  .hero-dark h2{
    font-size:30px;font-weight:800;margin:0 0 10px;color:#fff;
    line-height:1.35;
  }
  .hero-dark .h-desc{
    font-size:16px;color:#D4C9BE;line-height:1.65;
    font-family:"Noto Serif KR",serif;
  }
  .place-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
  }
  .place{
    background:var(--card);
    border-radius:14px;
    padding:24px;
    box-shadow:0 6px 18px rgba(180,110,60,.07);
    border-left:4px solid var(--coral);
  }
  .place.gold{ border-left-color:var(--gold); }
  .place.sage{ border-left-color:var(--sage); }
  .place .p-role{
    font-family:Georgia,serif;
    font-style:italic;
    font-size:22px;
    color:var(--coral);
    margin-bottom:6px;
  }
  .place.gold .p-role{ color:var(--gold); }
  .place.sage .p-role{ color:var(--sage); }
  .place h4{
    font-size:19px;font-weight:800;margin:0 0 12px;color:var(--ink);
  }
  .place .p-desc{
    font-size:15px;color:var(--ink-soft);line-height:1.65;
    font-family:"Noto Serif KR",serif;
  }

  /* ===== Slide 7: 지표 카드 ===== */
  .indicator-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    margin-bottom:24px;
  }
  .indicator{
    background:var(--card);
    border-radius:14px;
    padding:24px;
    box-shadow:0 6px 18px rgba(180,110,60,.07);
    position:relative;
    overflow:hidden;
  }
  .indicator::before{
    content:"";
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, var(--coral), var(--gold));
  }
  .indicator .i-label{
    font-family:Georgia,serif;
    font-size:12px;letter-spacing:1.5px;
    color:var(--ink-mute);text-transform:uppercase;
    margin-bottom:14px;
  }
  .indicator .i-title{
    font-size:19px;font-weight:800;color:var(--ink);
    margin-bottom:12px;line-height:1.35;
  }
  .indicator .i-desc{
    font-size:15px;color:var(--ink-soft);line-height:1.6;
    font-family:"Noto Serif KR",serif;
  }

  /* ===== Slide 8: 연결 도표 (환율×수출) ===== */
  .link-map{
    display:grid;
    grid-template-columns:1fr auto 1fr;
    gap:22px;
    align-items:center;
    background:var(--card);
    border-radius:16px;
    padding:32px;
    box-shadow:0 8px 22px rgba(180,110,60,.08);
    margin-bottom:24px;
  }
  .link-node{
    text-align:center;
    padding:22px;
    border-radius:12px;
    background:var(--line-soft);
  }
  .link-node .n-label{
    font-family:Georgia,serif;
    font-size:12px;letter-spacing:1.5px;
    color:var(--ink-mute);text-transform:uppercase;
    margin-bottom:8px;
  }
  .link-node .n-title{
    font-size:22px;font-weight:800;color:var(--ink);
    line-height:1.4;
  }
  .link-arrow{
    font-family:Georgia,serif;
    font-size:34px;
    color:var(--gold);
    font-weight:400;
  }
  .link-notes{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:16px;
  }
  .link-note{
    background:var(--card);
    border-left:3px solid var(--sage);
    border-radius:10px;
    padding:16px 20px;
    font-size:15px;color:var(--ink);line-height:1.65;
    box-shadow:0 4px 12px rgba(180,110,60,.05);
    font-family:"Noto Serif KR",serif;
  }
  .link-note strong{ color:var(--sage); font-weight:800; }

  /* ===== Slide 9: 캘린더/이벤트 리스트 ===== */
  .event-list{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:24px;
  }
  .event{
    background:var(--card);
    border-radius:12px;
    padding:22px 26px;
    box-shadow:0 4px 14px rgba(180,110,60,.06);
    display:grid;
    grid-template-columns:80px 1fr;
    gap:24px;
    align-items:center;
    border-left:3px solid var(--gold);
  }
  .event .e-num{
    font-family:Georgia,serif;
    font-style:italic;
    font-size:44px;
    color:var(--gold);
    line-height:1;
    text-align:center;
  }
  .event .e-body h4{
    font-size:19px;font-weight:800;margin:0 0 6px;color:var(--ink);
  }
  .event .e-body p{
    font-size:15px;color:var(--ink-soft);margin:0;line-height:1.6;
    font-family:"Noto Serif KR",serif;
  }

  /* ===== Slide 10: 마무리 5단계 여정 ===== */
  .journey{
    background:var(--card);
    border-radius:16px;
    padding:36px;
    box-shadow:0 8px 22px rgba(180,110,60,.08);
    margin-bottom:24px;
  }
  .journey .j-title{
    font-size:22px;font-weight:800;color:var(--ink);
    margin-bottom:24px;text-align:center;
  }
  .journey-steps{
    display:grid;
    grid-template-columns:repeat(3,1fr) auto;
    gap:14px;
    align-items:stretch;
  }
  .j-step{
    background:var(--line-soft);
    border-radius:12px;
    padding:20px;
    text-align:center;
  }
  .j-step .s-num{
    font-family:Georgia,serif;
    font-style:italic;
    font-size:32px;
    color:var(--coral);
    margin-bottom:8px;
    line-height:1;
  }
  .j-step .s-title{
    font-size:15px;font-weight:800;color:var(--ink);
    margin-bottom:6px;
  }
  .j-step .s-desc{
    font-size:13px;color:var(--ink-soft);line-height:1.55;
    font-family:"Noto Serif KR",serif;
  }
  .j-arrow{
    display:flex;align-items:center;justify-content:center;
    font-family:Georgia,serif;
    font-size:24px;color:var(--gold);
  }

  .footer-page{
    text-align:right;
    margin-top:24px;
    font-size:12px;
    color:var(--ink-mute);
    font-family:Georgia,serif;
    letter-spacing:1px;
  }

  @media (max-width:960px){
    .split-word,.agenda,.col-cards.c3,.place-row,.indicator-grid,.link-map,.link-notes,.journey-steps{
      grid-template-columns:1fr !important;
    }
    .link-arrow{ transform:rotate(90deg); text-align:center; }
    .j-arrow{ transform:rotate(90deg); }
  }
</style>
</head>
<body>
<div class="deck">

  <div class="topnav">
    <button class="toc-btn" onclick="goSlide(1)">&#9776; 목차</button>
    <div class="chapter-badge">WEEK 01</div>
    <div class="chapter-title">2026년 알아야 할 증시 상식</div>
  </div>

  <div class="tabs-row-wrap">
    <div class="tabs-row" id="tabs"></div>
    <div class="nav-controls">
      <button onclick="prevSlide()" title="이전">&#9664;</button>
      <button onclick="nextSlide()" title="다음">&#9654;</button>
      <button onclick="toggleFullscreen()" title="전체화면">&#9974;</button>
    </div>
  </div>

  <div class="stage" id="stage"></div>
  <div class="footer-page" id="pageFooter"></div>
</div>

<script>
const slides = [
  // ===== 1. Intro =====
  {
    render:()=>`
      <div class="intro">
        <div class="week">WEEK 01</div>
        <h1>2026년 알아야 할<br/>증시 상식</h1>
        <div class="sub">초급자가 가장 먼저 채워야 할 시야</div>
        <div class="divider"></div>
        <div class="callout">
          뉴스는 매일 쏟아지지만,<br/>
          <span class="accent">구조를 모르면</span> 같은 뉴스도 매번 새롭게 느껴진다
        </div>
      </div>
    `
  },

  // ===== 2. Agenda =====
  {
    render:()=>`
      <div class="agenda">
        <div class="agenda-card">
          <div class="part-num serif-en">I.</div>
          <div class="chip coral" style="margin-bottom:16px;">PART ONE</div>
          <h3>증시 구조 읽기</h3>
          <ul class="agenda-list">
            <li>2026년 증시, 무엇이 달라졌나</li>
            <li>금리와 주식의 관계</li>
            <li>누가 시장을 움직이나</li>
          </ul>
        </div>
        <div class="agenda-card sage">
          <div class="part-num serif-en">II.</div>
          <div class="chip sage" style="margin-bottom:16px;">PART TWO</div>
          <h3>수급과 일정 읽기</h3>
          <ul class="agenda-list">
            <li>외국인 수급 읽기</li>
            <li>환율과 수출 매크로 지표</li>
            <li>하반기 이벤트 캘린더</li>
            <li>뉴스를 구조로 읽는 법</li>
          </ul>
        </div>
      </div>
    `
  },

  // ===== 3. 밸류업 이후 (워드카드 + 포인트) =====
  {
    render:()=>`
      <div style="margin-bottom:20px;"><span class="chip gold">변화 · CHANGE</span></div>
      <div class="split-word">
        <div class="word-card">
          <div class="word-label">2024 → 2026</div>
          <div class="word-big">밸류업 프로그램<br/>이후의 자리</div>
          <div class="word-sub">"싸다"는 이유만으로 사던 시대에서, "변하고 있는가"를 보는 시대로.</div>
        </div>
        <div class="points">
          <div class="point">
            <div class="num serif-en">01</div>
            <div class="txt">저평가 해소를 위한 <b>기업 주주환원 확대</b> 흐름 — 배당·자사주 매입이 산업 전반의 문법이 되었다</div>
          </div>
          <div class="point">
            <div class="num serif-en">02</div>
            <div class="txt"><b>코리아 디스카운트</b> 논의의 실질적 변화 — 지배구조·회계투명성이 실제 주가에 반영되기 시작</div>
          </div>

let current = 0;

function renderSlide(idx){
  const s = slides[idx];
  document.getElementById("stage").innerHTML = `<div class="slide active">${s.render()}</div>`;
  document.getElementById("pageFooter").innerText = String(idx+1).padStart(2,"0") + " / " + String(slides.length).padStart(2,"0");
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", i===idx);
  });
}
function buildTabs(){
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = slides.map((_,i)=>`<div class="tab" onclick="goSlide(${i+1})">${i+1}</div>`).join("");
}
function goSlide(n){
  current = Math.min(Math.max(n-1,0), slides.length-1);
  renderSlide(current);
}
function nextSlide(){ goSlide(current+2 > slides.length ? slides.length : current+2); }
function prevSlide(){ goSlide(current <= 0 ? 1 : current); }
function toggleFullscreen(){
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen(); }
  else { document.exitFullscreen(); }
}
document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight" || e.key==="PageDown") nextSlide();
  if(e.key==="ArrowLeft"  || e.key==="PageUp")   prevSlide();
  if(e.key==="Home") goSlide(1);
  if(e.key==="End")  goSlide(slides.length);
});

buildTabs();
renderSlide(0);
</script>
